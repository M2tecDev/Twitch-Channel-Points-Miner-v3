name: Deploy Docker

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  deploy-docker:
    name: Build & Push (DockerHub + GHCR)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── DockerHub login ───────────────────────────────────────────────────
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ── GitHub Container Registry login ──────────────────────────────────
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build metadata (tags + labels) ───────────────────────────────────
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            m2tecdev/twitch-channel-points-miner-v3
            ghcr.io/m2tecdev/twitch-channel-points-miner-v3
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags') }}
            type=raw,value=latest

      # ── Multi-platform build & push ───────────────────────────────────────
      # BUILDX_QEMU_ENV=true is passed so the Dockerfile can detect 32-bit
      # ARM environments and install a compatible cryptography wheel.
      - name: Build and push (amd64 · arm64 · armv7)
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: BUILDX_QEMU_ENV=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "${{ steps.docker_build.outputs.digest }}"
