name: Deploy Docker

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

env:
  # Opt into Node.js 24 now – avoids deprecation warnings for all actions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-docker:
    name: Build & Push (GHCR)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # erlaubt push auf ghcr.io mit dem eingebauten GITHUB_TOKEN

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login zu GHCR – nur GITHUB_TOKEN, keine manuellen Secrets nötig ──
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build-Metadaten (Tags + Labels) ──────────────────────────────────
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/m2tecdev/twitch-channel-points-miner-v3
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags') }}
            type=raw,value=latest

      # ── Multi-platform Build & Push ───────────────────────────────────────
      # Platforms: amd64 + arm64 only.
      # linux/arm/v7 (32-bit) wurde entfernt: pandas hat seit v2.0 keine
      # pre-built Wheels mehr für 32-bit ARM. QEMU-Crosscompile bricht daher
      # beim Source-Build ab. Moderne Raspberry Pis nutzen 64-bit OS (arm64).
      - name: Build and push (amd64 · arm64)
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "${{ steps.docker_build.outputs.digest }}"
